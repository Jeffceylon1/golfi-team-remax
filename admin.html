<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Golfi Real Estate — Operator Console</title>
  <link rel="icon" href="assets/img/logo/fav-logo2.png">
  <link rel="stylesheet" href="assets/css/admin.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <!-- ============================= LOGIN ============================= -->
  <div id="login-screen" class="login-screen">
    <form id="login-form" class="login-card" autocomplete="on">
      <img src="assets/img/logo/golfi-logo-color.png" class="login-logo" alt="Golfi Real Estate">
      <h1 class="login-title">Operator Console</h1>
      <p class="login-sub">Sign in to manage your AI agent</p>

      <label class="login-field">
        <span>Email</span>
        <input type="email" id="login-email" name="email" autocomplete="username" required>
      </label>
      <label class="login-field">
        <span>Password</span>
        <input type="password" id="login-password" name="password" autocomplete="current-password" required>
      </label>

      <button type="submit" class="btn btn-primary btn-block" id="login-btn">Sign In</button>
      <p class="login-error" id="login-error" hidden></p>
    </form>
  </div>

  <!-- ============================= CONSOLE ============================= -->
  <div id="console" class="app" hidden>

    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <img src="assets/img/logo/golfi-logo-reverse.png" alt="Golfi Real Estate">
      </div>
      <nav class="nav" id="nav"><!-- nav items injected by admin.js --></nav>
      <div class="sidebar-foot">
        <details class="datakey" id="datakey">
          <summary>Data access key</summary>
          <div class="datakey-body">
            <input type="password" id="datakey-input" placeholder="Dashboard key">
            <button type="button" class="btn btn-primary btn-sm" id="datakey-save">Save key</button>
            <p class="datakey-hint">Required to load Leads, Live Visitors &amp; Conversations. Ask your developer for the dashboard key.</p>
          </div>
        </details>
        <div class="sidebar-version">Golfi Real Estate</div>
      </div>
    </aside>

    <div class="backdrop" id="backdrop"></div>

    <div class="main">
      <header class="topbar">
        <button class="hamburger" id="hamburger" aria-label="Toggle menu">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <div class="topbar-title">Golfi Real Estate — Operator Console</div>
        <div class="topbar-right">
          <span class="topbar-user" id="topbar-user"></span>
          <button class="btn btn-ghost btn-sm" id="logout-btn">Log out</button>
        </div>
      </header>

      <main class="content" id="content"><!-- panels injected by admin.js --></main>
    </div>
  </div>

  <div class="toast-wrap" id="toast-wrap"></div>

  <script src="assets/js/admin.js"></script>
</body>
</html>
